<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link href="src/css/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="w-full min-h-screen flex items-start justify-center bg-base-300 p-20">
        <div class="card w-96 bg-base-100 shadow-2xl rounded-3xl">
            <div class="card-body">
                <h2 class="text-4xl text-center text-primary">To Do List</h2>

                <div class="form-control w-full max-w-xs mt-6">
                    <label class="label">
                        <span class="label-text">What is your task?</span>
                    </label>
                    <div class="join w-full max-w-xs mt-2">
                        <input type="text" id="taskInput" placeholder="Type here"
                               class="input input-bordered join-item rounded-l-lg w-full max-w-xs" />
                        <button id="addBtn" class="btn bg-black join-item hover:bg-black/80 text-white rounded-r-lg">Add</button>
                    </div>
                </div>

                <div class="flex gap-2 my-3">
                    <input type="radio" name="filter" class="btn rounded-full btn-sm" aria-label="All" value="all" checked />
                    <input type="radio" name="filter" class="btn rounded-full btn-sm" aria-label="Active" value="active" />
                    <input type="radio" name="filter" class="btn rounded-full btn-sm" aria-label="Completed" value="completed" />
                </div>

                <p id="emptyState" class="text-center text-sm opacity-60 py-6">No tasks yet — add one above.</p>

                <ul id="taskList" class="list rounded-box flex flex-col gap-3"></ul>

                <div class="flex justify-between items-center mt-4 text-xs opacity-60">
                    <span id="counter">0 tasks remaining</span>
                    <button id="clearBtn" class="link link-hover">Clear completed</button>
                </div>
            </div>
        </div>
    </div>

    <script src="src/scripts/scripts.js"></script>
</body>
</html>
