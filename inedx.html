<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link href="src/css/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="w-full min-h-screen flex items-center justify-center bg-base-300">
        <div class="card w-96 bg-base-100 shadow-2xl rounded-3xl">
            <div class="card-body">
                <h2 class="text-4xl text-center text-primary">To Do List</h2>
                <div class="form-control w-full max-w-xs mt-6">
                    <label class="label">
                        <span class="label-text">What is your task?</span>
                    </label>
                    <div class="join w-full max-w-xs mt-6">
                        <input type="text" placeholder="Type here" class="input input-bordered join-item rounded-l-lg w-full max-w-xs" />
                        <button class="btn bg-black join-item hover:bg-black/80 text-white rounded-r-lg ">Add</button>
                    </div>
                </div>
                <form class="gap-3 my-3">
                    <input class="btn rounded-full btn-sm" type="radio" name="frameworks" aria-label="All"/>
                    <input class="btn rounded-full btn-sm" type="radio" name="frameworks" aria-label="Active"/>
                    <input class="btn rounded-full btn-sm" type="radio" name="frameworks" aria-label="Completed"/>
                </form>

                <ul class="list rounded-box">
                    <form action="" class="flex flex-col justify-around gap-3 items-start">
                        <li class="list-row w-full rounded-3xl border border-gray-300 items-center">
                            <input type="checkbox" class="checkbox border-black rounded-full checkbox-sm" />
                            <div>
                                <div>Dio Lupa</div>
                                <div class="text-xs uppercase font-semibold opacity-60">Remaining Reason</div>
                            </div>
                            <button class="btn bg-transparent border border-transparent shadow-none"><i class="fa-solid fa-trash-can"></i></button>
                        </li>
                        
                        <li class="list-row w-full rounded-3xl border border-gray-300 items-center">
                            <input type="checkbox" class="checkbox border-black rounded-full checkbox-sm" />
                            <div>
                                <div>Ellie Beilish</div>
                                <div class="text-xs uppercase font-semibold opacity-60">Bears of a fever</div>
                            </div>
                            <button class="btn bg-transparent border border-transparent shadow-none"><i class="fa-solid fa-trash-can"></i></button>
                        </li>
                        
                        <li class="list-row w-full rounded-3xl border border-gray-300 items-center">
                            <input type="checkbox" class="checkbox border-black rounded-full checkbox-sm" />
                            <div>
                                <div>Sabrino Gardener</div>
                                <div class="text-xs uppercase font-semibold opacity-60">Cappuccino</div>
                            </div>
                            <button class="btn bg-transparent border border-transparent shadow-none"><i class="fa-solid fa-trash-can"></i></button>
                        </li>
                    </form>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
